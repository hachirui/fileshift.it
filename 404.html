<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata – FileShift</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Mono',monospace;background:#faf9f6;color:#0f0f0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .num{font-family:'Fraunces',serif;font-size:8rem;font-weight:700;line-height:1;color:#e5e0d6;letter-spacing:-4px}
    .title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;margin:1rem 0 0.5rem;letter-spacing:-0.5px}
    .desc{font-size:13px;color:#7a7a7a;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#0f0f0f;color:#faf9f6;border-radius:10px;text-decoration:none;font-size:14px;transition:opacity .15s}
    .btn:hover{opacity:.8}
  </style>
</head>
<body>
  <div class="num">404</div>
  <div class="title">Pagina non trovata</div>
  <p class="desc">La pagina che cerchi non esiste o è stata spostata.</p>
  <a href="/" class="btn">← Torna alla home</a>
</body>
</html>
